<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RTTTL Hub</title>
    <!--
      Single Page Apps for GitHub Pages — MIT License
      https://github.com/rafgraph/spa-github-pages

      pathSegmentsToKeep = 0 because rtttl-hub.io is a root custom domain
      (no subdirectory prefix). This redirects any unknown path back to /?/path
      so the BrowserRouter in index.html can restore it via history.replaceState.
    -->
    <script>
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
